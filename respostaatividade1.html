
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Carros Elétricos</title>
</head>
<body>

    <h1>Carros Elétricos</h1>

    <form>
        <label for="nome">Nome completo:</label><br>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome,por favor" size="25"><br><br>

        <label for="modelo">Modelo de carro elétrico favorito:</label><br>
        <input type="text" id="modelo" name="modelo" placeholder="Ex:  Tesla Cybertruck" size="25"><br><br>

        <label for="senha">Crie uma senha de acesso:</label><br>
        <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" size="25"><br><br>

        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>

</body>
</html>
